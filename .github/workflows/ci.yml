permissions:
  contents: none # Minimal default permissions

on:
  workflow_call: # From .github/workflows/release.yml
  workflow_dispatch:
  pull_request:
  merge_group:
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  all-jobs:
    if: always() # Never skip, even if other jobs are skipped or canceled.
    name: all-jobs
    runs-on: ubuntu-latest
    needs:
      - build
      - lint
    steps:
      - run: jq --exit-status 'all(.result == "success")' <<< '${{ toJson(needs) }}'

  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # For actions/checkout@v4
    steps:
      - uses: actions/checkout@v4
      - run: cargo build

  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: read # For actions/checkout@v4
    steps:
      - uses: actions/checkout@v4
      - run: ./scripts/lint.sh
